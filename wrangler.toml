name = "wory-stripe-worker"
main = "server.js"
compatibility_date = "2024-01-01"

[vars]
# Add your Stripe keys here or use secrets
# STRIPE_SECRET_KEY = "sk_test_..."
# STRIPE_PRICE_1DAY = "price_..."
# STRIPE_PRICE_1WEEK = "price_..."
# STRIPE_PRICE_1MONTH = "price_..."
# STRIPE_WEBHOOK_SECRET = "whsec_..."

# Use secrets for sensitive data (recommended)
# Run: wrangler secret put STRIPE_SECRET_KEY
# Run: wrangler secret put STRIPE_PRICE_1DAY
# etc.

[[kv_namespaces]]
binding = "WORY_HTML"
id = "your_kv_namespace_id"
preview_id = "your_preview_kv_namespace_id"
